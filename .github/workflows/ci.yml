# =============================================================================
# Campus Cloud Print Queue — CI Pipeline
#
# Triggers : every push and pull request targeting the main branch.
# Strategy : four independent jobs run in parallel so the full suite completes
#            in ~2 minutes.  Each job validates one layer of the stack:
#              1. api-checks       — Go vet / build / test with race detector
#              2. python-checks    — worker compile check + pytest
#              3. terraform-checks — fmt / init / validate (no AWS creds needed)
#              4. docker-build     — both Dockerfiles produce valid images
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Go static analysis, compilation, and tests with race detection.
  api-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Go vet
        working-directory: services/api-gin
        run: go vet ./...

      - name: Go build
        working-directory: services/api-gin
        run: go build ./...

      - name: Go test
        working-directory: services/api-gin
        run: go test -v -race -cover ./...

  # Python syntax + unit tests with mocked AWS services (no creds needed).
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install worker dependencies
        run: pip install -r services/printer-worker/requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      # py_compile is a fast syntax gate before the full pytest suite.
      - name: Compile check — Worker
        run: python -m py_compile services/printer-worker/app/main.py

      - name: Run worker unit tests
        run: pytest tests/unit/test_worker.py -v
        env:
          AWS_DEFAULT_REGION: us-west-2
          DYNAMODB_TABLE: test-table
          S3_BUCKET: test-bucket
          SQS_QUEUE_URLS: "{}"

  # Validates HCL formatting, provider config, and module wiring.
  # -backend=false skips provider auth so CI runs without AWS credentials.
  terraform-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform fmt check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

  # Builds both images on linux/amd64 to catch Dockerfile errors and
  # architecture mismatches before code reaches main.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image (Go/Gin)
        run: docker build --platform linux/amd64 -t campus-print-api services/api-gin/

      - name: Build Worker image
        run: docker build --platform linux/amd64 -t campus-print-worker services/printer-worker/
